{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content_noauth %}
<div class="login-page">
    <div class="login-card">
        <!-- Left decorative panel -->
        <div class="login-brand">
            <div class="login-brand-content">
                <div class="logo-icon large">
                    <i data-lucide="scan-line"></i>
                </div>
                <h1>Track<span class="accent">IT</span></h1>
                <p>Welcome to the Team</p>
                <div class="login-features">
                    <div class="login-feature">
                        <i data-lucide="shield-check"></i>
                        <span>Secure Issue Tracking</span>
                    </div>
                    <div class="login-feature">
                        <i data-lucide="users"></i>
                        <span>Team Collaboration</span>
                    </div>
                    <div class="login-feature">
                        <i data-lucide="bar-chart-3"></i>
                        <span>Real-time Analytics</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right form panel -->
        <div class="login-form-panel">
            <div class="login-form-header">
                <h2>Create an Account</h2>
                <p>Fill in the details below to register</p>
            </div>

            <form method="POST" action="{{ url_for('signup') }}" class="login-form" id="signupForm" novalidate>
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <div class="input-wrapper">
                        <i data-lucide="type"></i>
                        <input type="text" id="full_name" name="full_name" placeholder="Enter your full name" required autocomplete="name">
                    </div>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="signupBtn">
                    <i data-lucide="user-plus"></i>
                    <span>Sign Up</span>
                </button>
            </form>

            <div style="text-align: center; margin-top: 16px; font-size: 0.85rem; color: var(--text-secondary);">
                Already have an account? <a href="{{ url_for('login') }}" style="font-weight: 600;">Sign In</a>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
