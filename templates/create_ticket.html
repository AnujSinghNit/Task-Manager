{% extends "base.html" %}
{% block title %}Create Ticket{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Create New Ticket</h1>
        <p class="page-subtitle">Fill in the details below to create a new support ticket</p>
    </div>
    <a href="{{ url_for('tickets') }}" class="btn btn-ghost" id="back-to-tickets-btn">
        <i data-lucide="arrow-left"></i>
        <span>Back to Tickets</span>
    </a>
</div>

<div class="card form-card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('create_ticket') }}" class="ticket-form" id="createTicketForm" novalidate>
            <!-- Title -->
            <div class="form-group">
                <label for="title">Title <span class="required">*</span></label>
                <input type="text" id="title" name="title" class="form-input" placeholder="Brief summary of the issue" required maxlength="200">
                <span class="form-hint">A concise, descriptive title for the ticket</span>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="description">Description <span class="required">*</span></label>
                <textarea id="description" name="description" class="form-input form-textarea" placeholder="Provide detailed information about the issue, including steps to reproduce, expected behavior, and actual behavior…" required rows="6"></textarea>
                <span class="form-hint">Include as much detail as possible</span>
            </div>

            <!-- Priority & Status Row -->
            <div class="form-row">
                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority" name="priority" class="form-select">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" name="status" class="form-select">
                        <option value="Open" selected>Open</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
            </div>

            <!-- Assigned To -->
            <div class="form-group">
                <label for="assigned_to">Assign To</label>
                <select id="assigned_to" name="assigned_to" class="form-select">
                    <option value="">— Unassigned —</option>
                    {% for user in users %}
                        <option value="{{ user }}">{{ user }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Actions -->
            <div class="form-actions">
                <a href="{{ url_for('tickets') }}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary" id="submitTicketBtn">
                    <i data-lucide="plus-circle"></i>
                    <span>Create Ticket</span>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
